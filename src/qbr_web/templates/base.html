<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QBR Portfolio Health Report{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"
        integrity="sha384-M06VwgoUOHG3FN0UchwWKqh9jS4ejwpoL0yjF3EVljtsxFwFETEYMkyNL5lXbJ5/"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"
        integrity="sha384-fw+eTlCc7suMV/1w/7fr2/PmwElUIt5i82bi+qTiLXvjRXZ2/FkiTNA/w0MhXnGI"
        crossorigin="anonymous"></script>
    <style>
        .prose h1 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .prose h2 { font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .prose h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.25rem; }
        .prose p { margin-bottom: 0.5rem; }
        .prose ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose strong { font-weight: 600; }
        .prose blockquote { border-left: 3px solid #d1d5db; padding-left: 1rem; color: #6b7280; font-style: italic; }

        /* Issue #45 — live-dashboard active-project flash.
           Scoped class name (not Tailwind's animate-pulse) to avoid collisions. */
        @media (prefers-reduced-motion: no-preference) {
            @keyframes qbr-active-flash {
                0%, 100% { border-color: rgb(6, 182, 212); box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
                50%      { border-color: rgb(8, 145, 178); box-shadow: 0 0 0 6px rgba(6, 182, 212, 0.25); }
            }
            .qbr-active-flash {
                animation: qbr-active-flash 1.2s ease-in-out infinite;
            }
            @keyframes qbr-just-updated {
                0%   { background-color: rgba(254, 240, 138, 0.7); }
                100% { background-color: transparent; }
            }
            .qbr-just-updated {
                animation: qbr-just-updated 0.6s ease-out;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .qbr-active-flash {
                border-color: rgb(6, 182, 212) !important;
                box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.4);
            }
            /* .qbr-just-updated: no motion — bold weight signals change instead */
            .qbr-just-updated { font-weight: 700; }
        }

        /* visually-hidden helper for aria-live regions */
        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0;
            margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0);
            white-space: nowrap; border: 0;
        }
    </style>
</head>
<body class="h-full bg-gray-50">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-cyan-700">QBR Portfolio Health</a>
            <span class="text-sm text-gray-500">v0.1.0</span>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
