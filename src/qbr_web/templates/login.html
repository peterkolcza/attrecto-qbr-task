{% extends "base.html" %}
{% block title %}Login — QBR{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-2xl font-bold text-center mb-2">QBR Portfolio Health</h1>
        <p class="text-center text-gray-500 text-sm mb-6">Please sign in to continue</p>

        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <input type="hidden" name="next" value="{{ next }}">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <button type="submit"
                    class="w-full bg-cyan-600 text-white py-2 px-4 rounded-md hover:bg-cyan-700 transition font-medium">
                Sign In
            </button>
        </form>

        <p class="mt-6 text-xs text-gray-400 text-center">
            Authorized personnel only.
        </p>
    </div>
</div>
{% endblock %}
